name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Setup Arch
      run: |
        pacman-key --init
        pacman-key --populate
        pacman -Syu --noconfirm
        pacman -S --noconfirm ansible python base-devel git sudo yamllint shellcheck

    - name: Create test user
      run: |
        useradd -m testuser
        echo "testuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

    - name: Lint
      run: |
        yamllint -d relaxed *.yml
        shellcheck *.sh || true

    - name: Ansible checks
      run: |
        ansible-playbook playbook.yml --syntax-check
        su - testuser -c "cd $GITHUB_WORKSPACE && ansible-playbook -i localhost, -c local playbook.yml --check --diff"